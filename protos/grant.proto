syntax = "proto3";

package grant;

option java_package = "com.heritage.grant";
option java_multiple_files = true;

service GrantService {
  rpc NegotiateGrant (stream GrantRequest) returns (stream GrantResponse);
}

message GrantRequest {
  string projectTitle = 1;
  double amountRequested = 2;
}

message GrantResponse {
  string status = 1;
  string feedback = 2;
}